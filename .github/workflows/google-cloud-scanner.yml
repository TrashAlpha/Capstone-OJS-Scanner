name: Deploy Scanner

on:
  push:
    paths:
      - 'scanner/**'
      - '.github/workflows/deploy-scanner.yml'

env:
  PROJECT_ID: 'capstone-ojs-scanner' # TODO: update to your Google Cloud project ID
  REGION: 'asia-southeast2' # TODO: update to your region
  SERVICE: 'scanner' # TODO: update to your service name
  IMAGE_NAME: 'scanner'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/373913331249/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider' # TODO: update to your workload identity provider

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-deployer-sa@capstone-ojs-scanner.iam.gserviceaccount.com

      - name: Docker Auth
        uses: docker/login-action@v3
        with:
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.auth_token }}
          registry: ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          docker build -t $IMAGE ./scanner
          docker push $IMAGE

      - name: Deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: scanner
          region: ${{ env.REGION }}
          image: $IMAGE
