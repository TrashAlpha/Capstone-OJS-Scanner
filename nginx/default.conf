server {
    listen 80;

    resolver 127.0.0.11 valid=30s;

    # Pakai redirect relatif agar host/port dari browser tidak dibuang
    absolute_redirect off;

    # =========================
    # OJS
    # =========================
    location / {
        set $upstream_ojs http://ojs:80;
        proxy_pass $upstream_ojs;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================
    # DASHBOARD
    # =========================
    location = /dashboard {
        return 301 /dashboard/;
    }

    location /dashboard/ {
        proxy_pass http://dashboard:8000/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dashboard;
    }

    # =========================
    # SCANNER API
    # =========================
    location /scanner/ {
        set $upstream_scanner http://scanner:5000;
        proxy_pass $upstream_scanner/;
    }
    
    # =========================
    # RISK-ENGINE API
    # =========================
    location /risk/ {
        set $upstream_risk http://risk-engine:5000;
        proxy_pass $upstream_risk/;
    }
}
