services:
  # =========================
  # NGINX (REVERSE PROXY)
  # =========================
  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ojs
      - dashboard
    networks:
      - appnet

  # =========================
  # OJS DATABASE (MySQL)
  # =========================
  ojs-db:
    image: mysql:8.0
    container_name: ojs-mysql
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ojs
      MYSQL_USER: ojsuser
      MYSQL_PASSWORD: ojs123
    volumes:
      - ojs_db_data:/var/lib/mysql
    networks:
      - appnet

  # =========================
  # OJS SERVER
  # =========================
  ojs:
    build: ./ojs
    container_name: ojs-app
    restart: always
    depends_on:
      - ojs-db
    environment:
      DATABASE_HOST: ojs-db
      DATABASE_NAME: ojs
      DATABASE_USER: ojsuser
      DATABASE_PASSWORD: ojs123
      # Nonaktifkan koneksi ke server PKP (pkp.sfu.ca)
      # yang menyebabkan delay & 500 error saat ganti halaman
      OJS_SHOW_UPGRADE_WARNING: 0
      OJS_DISABLE_BEACON: 1
    volumes:
      - ./ojs-files:/var/www/html/files
    networks:
      - appnet

  # =========================
  # SCANNER DB
  # =========================
  app-db:
    image: mysql:8.0
    container_name: mysql-app
    restart: always
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: app123
    volumes:
      - app_db_data:/var/lib/mysql
    networks:
      - appnet

  # =========================
  # SCANNER SERVICE
  # =========================
  scanner:
    build: ./scanner
    container_name: scanner-service
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - ojs
      - app-db
    environment:
      OJS_URL: http://ojs
      DATABASE_HOST: app-db
      DATABASE_NAME: appdb
      DATABASE_USER: appuser
      DATABASE_PASSWORD: app123
      # LLM Configuration (Gemini 3.5 Flash)
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_PROVIDER: gemini
      LLM_MODEL: gemini-3.5-flash
      # Nuclei Configuration
      NUCLEI_TIMEOUT: 300
      NUCLEI_RATE_LIMIT: 50
    networks:
      - appnet

  # =========================
  # RISK ENGINE SERVICE
  # =========================
  risk-engine:
    build: ./risk-engine
    container_name: risk-engine-service
    restart: always
    ports:
      - "5001:5000"
    depends_on:
      - scanner
    environment:
      SCANNER_URL: http://scanner:5000
      DATABASE_HOST: app-db
      DATABASE_NAME: appdb
      DATABASE_USER: appuser
      DATABASE_PASSWORD: app123
    networks:
      - appnet

  # =========================
  # TELEGRAM BOT (POLLING)
  # =========================
  telegram-bot:
    build: ./telegram-bot
    container_name: telegram-bot-service
    restart: always
    environment:
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-ojsscannerbot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-8093324098:AAEuipxc8bNxTvN3pXctSmo6HRoXD-iNkv0}
    networks:
      - appnet

  # =========================
  # DASHBOARD (Laravel)
  # =========================
  dashboard:
    build: ./dashboard
    container_name: laravel-dashboard
    restart: always
    ports:
      - "8181:8000"
    depends_on:
      - risk-engine
      - app-db
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost/dashboard
      DB_CONNECTION: mysql
      DB_HOST: app-db
      DB_PORT: 3306
      DB_DATABASE: appdb
      DB_USERNAME: appuser
      DB_PASSWORD: app123
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync
      SCANNER_URL: http://scanner:5000
      RISK_ENGINE_URL: http://risk-engine:5000
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-ojsscannerbot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-8093324098:AAEuipxc8bNxTvN3pXctSmo6HRoXD-iNkv0}
    networks:
      - appnet

# =========================
# VOLUMES
# =========================
volumes:
  ojs_db_data:
  app_db_data:

    # =========================
    # NETWORK
    # =========================
networks:
  appnet:
